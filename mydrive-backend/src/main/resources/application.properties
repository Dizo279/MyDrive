# ==================== SERVER ====================
server.port=8080
server.servlet.context-path=/api

# ==================== DATASOURCE ====================
spring.datasource.url=jdbc:mysql://localhost:3306/mydrive_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
spring.datasource.username=mydrive_user
spring.datasource.password=mydrive123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ==================== JPA / HIBERNATE ====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# ==================== FILE STORAGE ====================
# Thư mục lưu file upload (thay bằng đường dẫn thực trên máy bạn)
app.storage.path=D:\Uploads
app.storage.max-file-size=104857600

# ==================== JWT ====================
app.jwt.secret=myDrive_SuperSecret_Key_Change_This_In_Production_2024
app.jwt.expiration-ms=86400000
# 86400000 ms = 24 giờ

# ==================== FILE UPLOAD ====================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ==================== LOGGING ====================
logging.level.com.mydrive=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

app.base-url=http://localhost:8080/api