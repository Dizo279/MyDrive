<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify Card Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Circular+Std:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --spotify-green: #1DB954;
    --bg: #0a0a0f;
    --surface: #141418;
    --surface2: #1e1e25;
    --border: #2a2a35;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --accent: #1DB954;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    width: 28px; height: 28px;
    background: var(--spotify-green);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }

  .logo svg { width: 16px; height: 16px; fill: #000; }
  header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.3px; }
  header span { color: var(--muted); font-size: 13px; margin-left: auto; }

  .workspace {
    display: grid;
    grid-template-columns: 360px 1fr;
    flex: 1;
    gap: 0;
  }

  /* ── CONTROLS PANEL ── */
  .controls {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 28px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .controls h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .section { display: flex; flex-direction: column; gap: 14px; }

  label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 5px;
    display: block;
    font-weight: 500;
    letter-spacing: 0.3px;
  }

  input[type="text"], input[type="range"] {
    width: 100%;
  }

  input[type="text"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus {
    border-color: var(--spotify-green);
  }

  .color-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .color-swatch {
    width: 32px; height: 32px;
    border-radius: 8px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }

  .color-swatch:hover { transform: scale(1.1); }
  .color-swatch.active { border-color: white; }

  input[type="color"] {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    padding: 2px;
  }

  .upload-area {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }

  .upload-area:hover {
    border-color: var(--spotify-green);
    background: rgba(29,185,84,0.04);
  }

  .upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-area p { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .upload-area .icon { font-size: 24px; }

  #albumPreviewThumb {
    width: 60px; height: 60px;
    border-radius: 8px;
    object-fit: cover;
    display: none;
    margin: 8px auto 0;
  }

  .range-wrap { display: flex; flex-direction: column; gap: 6px; }
  .range-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); }

  input[type="range"] {
    -webkit-appearance: none;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: white;
    cursor: pointer;
  }

  .toggle-group {
    display: flex;
    background: var(--surface2);
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
  }

  .toggle-btn {
    flex: 1;
    padding: 7px;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
    font-weight: 500;
  }

  .toggle-btn.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }

  .divider {
    height: 1px;
    background: var(--border);
  }

  .export-btn {
    background: var(--spotify-green);
    color: #000;
    border: none;
    border-radius: 50px;
    padding: 14px 20px;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    width: 100%;
    letter-spacing: 0.5px;
    transition: background 0.2s, transform 0.1s;
  }

  .export-btn:hover { background: #1ed760; }
  .export-btn:active { transform: scale(0.98); }

  /* ── PREVIEW PANEL ── */
  .preview-panel {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    background: radial-gradient(ellipse at center, #1a1a22 0%, var(--bg) 70%);
  }

  /* ── SPOTIFY CARD ── */
  #spotifyCard {
    width: 320px;
    border-radius: 24px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 40px 80px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.06);
  }

  .card-bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, var(--card-color1, #b5251a) 0%, var(--card-color2, #6b1510) 100%);
    z-index: 0;
  }

  .card-content {
    position: relative;
    z-index: 1;
    padding: 20px 20px 28px;
  }

  /* Top bar */
  .card-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .card-topbar .chevron {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0.7;
  }

  .card-topbar .title {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.3px;
  }

  .card-topbar .dots {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0.7;
  }

  /* Album art */
  .album-art-wrap {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 24px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    background: rgba(0,0,0,0.3);
  }

  #cardAlbumArt {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Song info */
  .song-info {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .song-text { flex: 1; min-width: 0; }

  #cardTitle {
    font-size: 17px;
    font-weight: 700;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: -0.2px;
  }

  #cardArtist {
    font-size: 13px;
    color: rgba(255,255,255,0.65);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .heart-btn {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  /* Progress */
  .progress-wrap {
    margin-bottom: 16px;
  }

  .progress-bar {
    height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    position: relative;
    margin-bottom: 6px;
    cursor: pointer;
  }

  .progress-fill {
    height: 100%;
    border-radius: 2px;
    background: #fff;
    position: relative;
    transition: width 0.1s;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: -5px; top: 50%;
    transform: translateY(-50%);
    width: 10px; height: 10px;
    background: #fff;
    border-radius: 50%;
  }

  .time-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    font-weight: 500;
  }

  /* Controls */
  .playback-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .ctrl-btn {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.7);
  }

  .ctrl-btn.play {
    width: 56px; height: 56px;
    background: #fff;
    border-radius: 50%;
    color: #000;
  }

  .ctrl-btn svg { width: 20px; height: 20px; fill: currentColor; }
  .ctrl-btn.play svg { width: 24px; height: 24px; }

  /* Bottom row */
  .bottom-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    opacity: 0.7;
  }

  .bottom-row svg { width: 18px; height: 18px; fill: rgba(255,255,255,0.7); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
  </div>
  <h1>Spotify Card Generator</h1>
  <span>Tạo ảnh giao diện Spotify</span>
</header>

<div class="workspace">

  <!-- CONTROLS -->
  <div class="controls">
    <h2>Chỉnh sửa</h2>

    <div class="section">
      <div>
        <label>Tên bài hát</label>
        <input type="text" id="inputTitle" value="From Me to You - Mono / Remastered" oninput="updateCard()">
      </div>
      <div>
        <label>Nghệ sĩ</label>
        <input type="text" id="inputArtist" value="The Beatles" oninput="updateCard()">
      </div>
      <div>
        <label>Tên album / playlist (thanh trên)</label>
        <input type="text" id="inputAlbum" value="1 (Remastered)" oninput="updateCard()">
      </div>
    </div>

    <div class="divider"></div>

    <div class="section">
      <div>
        <label>Ảnh bìa album</label>
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
          <input type="file" id="fileInput" accept="image/*" onchange="loadAlbumArt(event)">
          <div class="icon">🖼️</div>
          <p>Nhấn để chọn ảnh</p>
          <img id="albumPreviewThumb" src="" alt="">
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section">
      <div>
        <label>Màu nền card</label>
        <div class="color-row">
          <div class="color-swatch active" style="background:#b5251a" onclick="setBg('#b5251a','#6b1510',this)"></div>
          <div class="color-swatch" style="background:#1a3a6b" onclick="setBg('#1a3a6b','#0d1f3c',this)"></div>
          <div class="color-swatch" style="background:#1a4a2e" onclick="setBg('#1a4a2e','#0d2a18',this)"></div>
          <div class="color-swatch" style="background:#3a1a6b" onclick="setBg('#3a1a6b','#1d0d3c',this)"></div>
          <div class="color-swatch" style="background:#4a3a1a" onclick="setBg('#4a3a1a','#2a200d',this)"></div>
          <div class="color-swatch" style="background:#1a3a4a" onclick="setBg('#1a3a4a','#0d202a',this)"></div>
          <div class="color-swatch" style="background:#2a2a2a" onclick="setBg('#2a2a2a','#111',this)"></div>
          <input type="color" id="customColor" title="Màu tùy chỉnh" onchange="setCustomBg(this.value)">
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section">
      <div>
        <label>Thời gian hiện tại</label>
        <input type="text" id="inputCurrent" value="0:38" oninput="updateCard()">
      </div>
      <div>
        <label>Tổng thời gian</label>
        <input type="text" id="inputTotal" value="1:59" oninput="updateCard()">
      </div>
      <div>
        <label>Tiến độ bài hát (%)</label>
        <div class="range-wrap">
          <input type="range" id="inputProgress" min="0" max="100" value="32" oninput="updateCard()">
          <div class="range-labels"><span>0%</span><span id="progressLabel">32%</span><span>100%</span></div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section">
      <div>
        <label>Trạng thái nút tim</label>
        <div class="toggle-group">
          <button class="toggle-btn" onclick="setHeart(false,this)">Chưa thích</button>
          <button class="toggle-btn active" onclick="setHeart(true,this)">Đã thích ❤️</button>
        </div>
      </div>
      <div>
        <label>Trạng thái phát</label>
        <div class="toggle-group">
          <button class="toggle-btn" onclick="setPlaying(false,this)">▶ Play</button>
          <button class="toggle-btn active" onclick="setPlaying(true,this)">⏸ Pause</button>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <button class="export-btn" onclick="exportImage()">⬇ Tải ảnh xuống</button>
  </div>

  <!-- PREVIEW -->
  <div class="preview-panel">
    <div id="spotifyCard">
      <div class="card-bg" id="cardBg"></div>
      <div class="card-content">

        <!-- Top bar -->
        <div class="card-topbar">
          <div class="chevron">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2.5" stroke-linecap="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
          </div>
          <div class="title" id="cardAlbumLabel">1 (Remastered)</div>
          <div class="dots">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="rgba(255,255,255,0.8)"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
          </div>
        </div>

        <!-- Album Art -->
        <div class="album-art-wrap">
          <img id="cardAlbumArt" src="https://upload.wikimedia.org/wikipedia/en/b/bb/Beatles_-_1_%282000%29.png" alt="Album Art" crossorigin="anonymous">
        </div>

        <!-- Song info -->
        <div class="song-info">
          <div class="song-text">
            <div id="cardTitle">From Me to You - Mono / Remastered</div>
            <div id="cardArtist">The Beatles</div>
          </div>
          <div class="heart-btn" id="heartBtn">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="#1DB954" stroke="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          </div>
        </div>

        <!-- Progress -->
        <div class="progress-wrap">
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width:32%"></div>
          </div>
          <div class="time-labels">
            <span id="cardCurrent">0:38</span>
            <span id="cardTotal">1:59</span>
          </div>
        </div>

        <!-- Playback controls -->
        <div class="playback-controls">
          <!-- Shuffle -->
          <div class="ctrl-btn">
            <svg viewBox="0 0 24 24"><path d="M16 3h5v5l-1.5-1.5-4.5 4.5-1.5-1.5 4.5-4.5L16 3zm-8 8L4.5 7.5 3 9l4 4-4 4 1.5 1.5L8 15l3.5 3.5L13 17l-5-5zm7.5 3l-1.5 1.5 4.5 4.5L16 21h5v-5l-1.5 1.5-4.5-4.5z"/></svg>
          </div>
          <!-- Prev -->
          <div class="ctrl-btn">
            <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
          </div>
          <!-- Play/Pause -->
          <div class="ctrl-btn play" id="playBtn">
            <svg viewBox="0 0 24 24" id="playIcon"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </div>
          <!-- Next -->
          <div class="ctrl-btn">
            <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg>
          </div>
          <!-- Repeat -->
          <div class="ctrl-btn">
            <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
          </div>
        </div>

        <!-- Bottom row -->
        <div class="bottom-row">
          <svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
          <svg viewBox="0 0 24 24"><path d="M17 16l-4-4V4h-2v8.97l-4 4.03V21h10v-5zM10 2h4v2h-4z"/></svg>
        </div>

      </div>
    </div>
  </div>
</div>

<script>
  let heartLiked = true;
  let isPlaying = true;
  let albumArtDataUrl = null;

  function updateCard() {
    document.getElementById('cardTitle').textContent = document.getElementById('inputTitle').value;
    document.getElementById('cardArtist').textContent = document.getElementById('inputArtist').value;
    document.getElementById('cardAlbumLabel').textContent = document.getElementById('inputAlbum').value;
    document.getElementById('cardCurrent').textContent = document.getElementById('inputCurrent').value;
    document.getElementById('cardTotal').textContent = document.getElementById('inputTotal').value;
    const prog = document.getElementById('inputProgress').value;
    document.getElementById('progressFill').style.width = prog + '%';
    document.getElementById('progressLabel').textContent = prog + '%';
  }

  function setBg(c1, c2, el) {
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('spotifyCard').style.setProperty('--card-color1', c1);
    document.getElementById('spotifyCard').style.setProperty('--card-color2', c2);
    document.querySelector('.card-bg').style.background = `linear-gradient(180deg, ${c1} 0%, ${c2} 100%)`;
  }

  function setCustomBg(val) {
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
    const dark = shadeColor(val, -40);
    document.querySelector('.card-bg').style.background = `linear-gradient(180deg, ${val} 0%, ${dark} 100%)`;
  }

  function shadeColor(color, pct) {
    const num = parseInt(color.replace('#',''), 16);
    const r = Math.max(0, Math.min(255, (num >> 16) + pct));
    const g = Math.max(0, Math.min(255, ((num >> 8) & 0xff) + pct));
    const b = Math.max(0, Math.min(255, (num & 0xff) + pct));
    return '#' + ((1 << 24) | (r << 16) | (g << 8) | b).toString(16).slice(1);
  }

  function setHeart(liked, btn) {
    heartLiked = liked;
    document.querySelectorAll('.toggle-btn').forEach(b => {
      if (b.closest('.toggle-group') === btn.closest('.toggle-group')) b.classList.remove('active');
    });
    btn.classList.add('active');
    const heartBtn = document.getElementById('heartBtn');
    heartBtn.innerHTML = liked
      ? `<svg viewBox="0 0 24 24" width="22" height="22" fill="#FFFFFF"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`
      : `<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
  }

  function setPlaying(playing, btn) {
    isPlaying = playing;
    document.querySelectorAll('.toggle-btn').forEach(b => {
      if (b.closest('.toggle-group') === btn.closest('.toggle-group')) b.classList.remove('active');
    });
    btn.classList.add('active');
    document.getElementById('playIcon').setAttribute('d',
      playing
        ? 'M6 19h4V5H6v14zm8-14v14h4V5h-4z'
        : 'M8 5v14l11-7z'
    );
  }

  function loadAlbumArt(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      albumArtDataUrl = e.target.result;
      document.getElementById('cardAlbumArt').src = albumArtDataUrl;
      const thumb = document.getElementById('albumPreviewThumb');
      thumb.src = albumArtDataUrl;
      thumb.style.display = 'block';
      document.querySelector('.upload-area p').textContent = file.name;
    };
    reader.readAsDataURL(file);
  }

  async function exportImage() {
    const btn = document.querySelector('.export-btn');
    btn.textContent = '⏳ Đang xử lý...';
    btn.disabled = true;

    try {
      const card = document.getElementById('spotifyCard');
      const canvas = await html2canvas(card, {
        scale: 3,
        useCORS: true,
        allowTaint: true,
        backgroundColor: null,
        logging: false
      });

      const link = document.createElement('a');
      link.download = 'spotify-card.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    } catch (err) {
      alert('Lỗi khi xuất ảnh: ' + err.message);
    }

    btn.textContent = '⬇ Tải ảnh xuống';
    btn.disabled = false;
  }
</script>
</body>
</html>
